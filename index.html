<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Anieer, con amor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-hearts" id="hearts-container"></div>
    
    <main class="content-wrapper">
        <div class="heart-container">
            <svg class="main-heart" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 28.5L14.1 26.75C7.35 20.65 3 16.7 3 11.85C3 7.85 6.15 4.7 10.15 4.7C12.45 4.7 14.65 5.75 16 7.45C17.35 5.75 19.55 4.7 21.85 4.7C25.85 4.7 29 7.85 29 11.85C29 16.7 24.65 20.65 17.9 26.75L16 28.5Z" fill="#f48fb1"/>
            </svg>
        </div>
        
        <h1 class="title">Anieer</h1>
        
        <p class="message">
            "con tu presecia la vida me esta entregando todos los pedacitos de alegria que me debia"
        </p>
        
        <div class="decoration">
            <span class="dot"></span>
            <span class="dot gold"></span>
            <span class="dot"></span>
        </div>

        <button id="surprise-btn" class="surprise-btn">
            Click aqui
        </button>
    </main>

    <div id="card-overlay" class="overlay hidden">
        <div class="card">
            <button id="close-card" class="close-btn">&times;</button>
            <div class="card-content">
                <span class="card-heart">❤️</span>
                <h2 class="card-title">Para ti</h2>
                <p class="card-message">heme aqui, pensandote a toda hora</p>
            </div>
        </div>
    </div>

    <footer class="footer">
        Con todo mi amor
    </footer>

    <script src="script.js"></script>
</body>
</html>
